<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillPulse - Change Password</title>
  <link rel="icon" type="image/jpeg" href="./SkillPulse logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .password-card { max-width: 460px; }
    .auth-heading {
      text-align: center;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.5;
      margin: -1rem 0 1.5rem;
    }
    .form-global-error.success {
      color: var(--success);
      background: rgba(90,144,32,.1);
    }
    .secondary-link {
      display: block;
      text-align: center;
      margin-top: .9rem;
      color: var(--taupe);
      font-size: .84rem;
      font-weight: 600;
      text-decoration: none;
    }
    .input-wrap.password-wrap input {
      padding-right: 3.2rem;
    }
    .password-toggle {
      position: absolute;
      right: .7rem;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: var(--taupe);
      cursor: pointer;
      padding: .35rem;
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .password-toggle:hover,
    .password-toggle:focus {
      color: var(--dark);
      background: rgba(161,130,118,.1);
      outline: none;
    }
    .password-toggle svg {
      width: 1.15rem;
      height: 1.15rem;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>
  <div class="bg-blob blob-4"></div>
  <div class="noise-overlay"></div>

  <div class="auth-page">
    <div class="auth-card password-card">
      <div class="auth-logo-wrap">
        <img src="./assets/SkillPulse logo.png" alt="SkillPulse" class="auth-logo">
        <div class="auth-logo-ring r1"></div>
        <div class="auth-logo-ring r2"></div>
      </div>

      <div class="auth-brand">
        <span class="brand-skill">Skill</span><span class="brand-pulse">Pulse</span>
      </div>
      <div class="auth-tagline">Secure your account.</div>
      <p class="auth-heading">Enter your current password and choose a new one.</p>

      <form id="password-form" class="auth-form active" novalidate>
        <div class="form-group">
          <label for="current-password">Current Password</label>
          <div class="input-wrap password-wrap">
            <input type="password" id="current-password" placeholder="Enter current password" autocomplete="current-password">
            <button type="button" class="password-toggle" data-target="current-password" aria-label="Show current password"></button>
          </div>
          <span class="field-error" id="current-password-err"></span>
        </div>

        <div class="form-group">
          <label for="new-password">New Password</label>
          <div class="input-wrap password-wrap">
            <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password">
            <button type="button" class="password-toggle" data-target="new-password" aria-label="Show new password"></button>
          </div>
          <span class="field-error" id="new-password-err"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm New Password</label>
          <div class="input-wrap password-wrap">
            <input type="password" id="confirm-password" placeholder="Re-enter new password" autocomplete="new-password">
            <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Show confirm password"></button>
          </div>
          <span class="field-error" id="confirm-password-err"></span>
        </div>

        <div class="form-global-error" id="password-message"></div>

        <button type="submit" class="auth-btn" id="password-btn">
          <span class="btn-text">Update Password</span>
        </button>
      </form>

      <a href="/dashboard.html#settings" class="secondary-link">Back to settings</a>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function setFieldError(id, message) {
      const el = $(id);
      if (el) el.textContent = message || '';
    }

    function setMessage(message, success) {
      const el = $('password-message');
      el.textContent = message || '';
      el.classList.toggle('show', Boolean(message));
      el.classList.toggle('success', Boolean(success));
    }

    function currentToken() {
      try {
        const stored = sessionStorage.getItem('sp_current_user');
        return stored ? JSON.parse(stored).token : null;
      } catch (e) {
        return null;
      }
    }

    (function requireLogin() {
      if (!currentToken()) window.location.href = '/login.html';
    })();

    const eyeIcon = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
    `;
    const eyeOffIcon = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 3l18 18"></path>
        <path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"></path>
        <path d="M9.9 5.2A10.9 10.9 0 0 1 12 5c6.5 0 10 7 10 7a17.8 17.8 0 0 1-3.2 4.1"></path>
        <path d="M6.4 6.9C3.6 8.7 2 12 2 12s3.5 7 10 7a10.8 10.8 0 0 0 4.1-.8"></path>
      </svg>
    `;

    document.querySelectorAll('.password-toggle').forEach(button => {
      button.innerHTML = eyeIcon;
      button.addEventListener('click', () => {
        const input = $(button.dataset.target);
        const showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        button.innerHTML = showing ? eyeIcon : eyeOffIcon;
        button.setAttribute('aria-label', `${showing ? 'Show' : 'Hide'} ${input.id.replace(/-/g, ' ')}`);
      });
    });

    $('password-form').addEventListener('submit', async event => {
      event.preventDefault();
      setMessage('', false);
      setFieldError('current-password-err', '');
      setFieldError('new-password-err', '');
      setFieldError('confirm-password-err', '');

      const token = currentToken();
      const currentPassword = $('current-password').value;
      const newPassword = $('new-password').value;
      const confirmPassword = $('confirm-password').value;
      let valid = true;

      if (!currentPassword) {
        setFieldError('current-password-err', 'Current password is required.');
        valid = false;
      }
      if (newPassword.length < 8) {
        setFieldError('new-password-err', 'New password must be at least 8 characters.');
        valid = false;
      }
      if (newPassword !== confirmPassword) {
        setFieldError('confirm-password-err', 'Passwords do not match.');
        valid = false;
      }
      if (!valid) return;

      $('password-btn').disabled = true;
      try {
        const response = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, currentPassword, newPassword })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.message || 'Unable to update password.');

        $('password-form').reset();
        setMessage(data.message || 'Password updated successfully.', true);
      } catch (err) {
        setMessage(err.message || 'Unable to update password.', false);
      } finally {
        $('password-btn').disabled = false;
      }
    });
  </script>
</body>
</html>
