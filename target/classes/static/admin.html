<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SkillPulse Admin</title>
  <link rel="icon" href="./SkillPulse logo.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
    :root{--canvas:#f5ede4;--surface:#fffaf7;--line:#eadbd2;--ink:#3a2a22;--muted:#8a7167;--primary:#9b7464;--primary-soft:#f1e6df;--success:#7aab7a;--success-soft:#edf6eb;--danger:#d4685a;--danger-soft:#fae9e6;--warning:#d4aa5a;--shadow:0 8px 24px rgba(140,100,80,.10)}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:'DM Sans',sans-serif;background:var(--canvas);color:var(--ink);min-height:100vh} button,input,select,textarea{font:inherit}
    .app{display:grid;grid-template-columns:220px minmax(0,1fr);min-height:100vh}.sidebar{background:#3a2a22;color:#fff;padding:22px 15px;display:flex;flex-direction:column;gap:8px}.brand{display:flex;align-items:center;gap:10px;padding:0 8px 20px;font-weight:700}.brand img{width:30px;height:30px;border-radius:7px}.admin-label{padding:13px;background:#4a372f;border:1px solid rgba(255,255,255,.08);border-radius:7px;margin-bottom:12px}.admin-label strong{font-size:13px}.admin-label span{display:block;color:#c9b8af;font-size:10px;margin-top:3px}.nav{display:flex;align-items:center;gap:10px;padding:10px;border-radius:7px;color:#d8c9c1;text-decoration:none;font-size:13px}.nav.active{background:var(--primary);color:#fff}.nav:hover{background:rgba(255,255,255,.08);color:#fff}.nav svg{width:17px}.logout{width:100%;justify-content:flex-start;margin-top:auto;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#d8c9c1;cursor:pointer}.logout:hover{background:rgba(216,100,87,.16);border-color:rgba(216,100,87,.34);color:#fff}
    .main{padding:28px 32px}.header{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:22px}.header h1{font-family:'Fraunces',serif;font-size:29px;font-weight:600}.header p{color:var(--muted);font-size:12px;margin-top:5px}.btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);border-radius:7px;padding:9px 13px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:7px}.btn svg{width:16px;height:16px}.btn:hover{background:var(--primary-soft)}.btn-primary{background:var(--primary);color:#fff;border-color:transparent}.btn-primary:hover{background:#7f5e50}.btn-danger{color:var(--danger)}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.card{background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.stat{padding:16px}.stat span{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700}.stat strong{display:block;font-size:24px;margin-top:6px}
    .toolbar{padding:14px;display:grid;grid-template-columns:minmax(220px,1fr) repeat(3,minmax(130px,180px));gap:10px;margin-bottom:14px}.field-control{width:100%;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:7px;padding:10px 11px;outline:none}.field-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(155,116,100,.12)}
    .table-card{overflow:hidden}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:980px}th{text-align:left;padding:12px 14px;background:#f7eee8;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px}td{padding:13px 14px;border-top:1px solid var(--line);vertical-align:middle;font-size:12px}.question-cell{max-width:370px}.question-cell strong{display:block;font-size:12px;line-height:1.45}.question-cell span,.module-cell span{display:block;color:var(--muted);font-size:10px;margin-top:4px}.pill{display:inline-flex;padding:4px 8px;border-radius:99px;font-size:9px;font-weight:700;text-transform:capitalize}.pill.active{background:var(--success-soft);color:#57825a}.pill.disabled{background:var(--danger-soft);color:var(--danger)}.pill.easy{background:var(--success-soft);color:#57825a}.pill.medium{background:#fbf2df;color:#a87820}.pill.hard{background:var(--danger-soft);color:var(--danger)}.actions{display:flex;gap:6px}.icon-btn{width:34px;height:34px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--ink);display:grid;place-items:center;cursor:pointer}.icon-btn:hover{background:var(--primary-soft)}.icon-btn svg{width:15px}.pagination{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-top:1px solid var(--line);color:var(--muted);font-size:11px}.page-actions{display:flex;gap:6px}
    .overlay{position:fixed;inset:0;background:rgba(45,31,25,.55);display:none;align-items:center;justify-content:center;padding:24px;z-index:30}.overlay.show{display:flex}.modal{width:min(820px,100%);max-height:92vh;overflow:auto;background:var(--surface);border-radius:9px;border:1px solid var(--line);box-shadow:0 25px 70px rgba(45,31,25,.24)}.modal-head{position:sticky;top:0;z-index:2;background:var(--surface);padding:20px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal-head h2{font-family:'Fraunces',serif;font-size:22px}.modal-body{padding:22px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:11px;font-weight:700}.field textarea{min-height:90px;resize:vertical}.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.option-input{display:grid;grid-template-columns:24px 1fr;align-items:center;gap:7px}.option-input input[type=radio]{accent-color:var(--success)}.modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:20px}.message{display:none;margin-bottom:14px;padding:10px 12px;border-radius:7px;background:var(--danger-soft);color:var(--danger);font-size:11px}.message.show{display:block}.empty{padding:40px;text-align:center;color:var(--muted)}.toast{position:fixed;right:24px;bottom:24px;background:#3a2a22;color:#fff;padding:12px 15px;border-radius:7px;font-size:12px;transform:translateY(80px);opacity:0;transition:.2s;z-index:50}.toast.show{transform:none;opacity:1}
    @media(max-width:900px){.app{grid-template-columns:76px 1fr}.sidebar{padding:16px 10px}.brand span,.admin-label,.nav span{display:none}.brand,.nav{justify-content:center}.stats{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr 1fr}.main{padding:22px 18px}}
    @media(max-width:620px){.app{display:block}.sidebar{position:sticky;top:0;z-index:20;flex-direction:row;overflow:auto}.brand,.logout{display:none}.nav{min-width:44px}.main{padding:18px 12px}.header{flex-direction:column}.stats,.toolbar,.form-grid,.option-grid{grid-template-columns:1fr}.field.full{grid-column:auto}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><img src="./SkillPulse logo.png" alt=""><span>SkillPulse</span></div>
    <div class="admin-label"><strong>Question Manager</strong><span>Administrator workspace</span></div>
    <a class="nav active" href="admin.html"><i data-lucide="list-checks"></i><span>Questions</span></a>
    <a class="nav" href="admin-users.html"><i data-lucide="users"></i><span>Users</span></a>
    <a class="nav" href="dashboard.html"><i data-lucide="layout-dashboard"></i><span>User Dashboard</span></a>
    <button class="nav logout" onclick="logoutAdmin()"><i data-lucide="log-out"></i><span>Logout</span></button>
  </aside>
  <main class="main">
    <div class="header"><div><h1>Question Manager</h1><p>Manage assessment content, availability, and performance</p></div><button class="btn btn-primary" onclick="openEditor()"><i data-lucide="plus"></i>Add Question</button></div>
    <div class="stats"><div class="card stat"><span>Total Questions</span><strong id="total-stat">0</strong></div><div class="card stat"><span>Active</span><strong id="active-stat">0</strong></div><div class="card stat"><span>Disabled</span><strong id="disabled-stat">0</strong></div><div class="card stat"><span>Average Accuracy</span><strong id="accuracy-stat">0%</strong></div></div>
    <div class="card toolbar"><input class="field-control" id="search" placeholder="Search questions..." oninput="applyFilters()"><select class="field-control" id="subject-filter" onchange="subjectFilterChanged()"><option value="">All subjects</option></select><select class="field-control" id="topic-filter" onchange="applyFilters()"><option value="">All modules</option></select><select class="field-control" id="status-filter" onchange="applyFilters()"><option value="">All statuses</option><option value="active">Active</option><option value="disabled">Disabled</option></select></div>
    <div class="card table-card"><div class="table-wrap"><table><thead><tr><th>Question</th><th>Subject / Module</th><th>Difficulty</th><th>Status</th><th>Performance</th><th>Actions</th></tr></thead><tbody id="question-rows"></tbody></table></div><div class="pagination"><span id="page-info">0 questions</span><div class="page-actions"><button class="btn" id="prev-page" onclick="changePage(-1)">Previous</button><button class="btn" id="next-page" onclick="changePage(1)">Next</button></div></div></div>
  </main>
</div>

<div class="overlay" id="editor-overlay">
  <form class="modal" onsubmit="saveQuestion(event)">
    <div class="modal-head"><h2 id="editor-title">Add Question</h2><button class="icon-btn" type="button" onclick="closeEditor()"><i data-lucide="x"></i></button></div>
    <div class="modal-body"><div class="message" id="editor-message"></div><input type="hidden" id="question-id"><div class="form-grid">
      <div class="field"><label>Subject</label><select class="field-control" id="editor-subject" onchange="loadEditorTopics()" required></select></div>
      <div class="field"><label>Module</label><select class="field-control" id="editor-topic" required></select></div>
      <div class="field"><label>Difficulty</label><select class="field-control" id="editor-difficulty" required><option value="EASY">Easy</option><option value="MEDIUM">Medium</option><option value="HARD">Hard</option></select></div>
      <div class="field full"><label>Question</label><textarea class="field-control" id="editor-prompt" required></textarea></div>
      <div class="field full"><label>Options (select the correct answer)</label><div class="option-grid" id="option-grid"></div></div>
      <div class="field full"><label>Explanation</label><textarea class="field-control" id="editor-explanation" required></textarea></div>
    </div><div class="modal-actions"><button class="btn" type="button" onclick="closeEditor()">Cancel</button><button class="btn btn-primary" type="submit" id="save-btn">Save Question</button></div></div>
  </form>
</div>
<div class="toast" id="toast"></div>

<script>
  let questions=[],filtered=[],subjects=[],topicCache={},page=1; const pageSize=12;
  function icons(){if(window.lucide)lucide.createIcons({'stroke-width':1.8})}
  function session(){try{return JSON.parse(sessionStorage.getItem('sp_current_user')||'null')}catch(e){return null}}
  function token(){return session()&&session().token}
  async function api(url,options){const response=await fetch(url,options);const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.message||'Request failed.');return data}
  async function init(){const user=session();if(!user||!user.token){location.href='login.html';return}try{const me=await api('/api/auth/me?token='+encodeURIComponent(user.token));sessionStorage.setItem('sp_current_user',JSON.stringify(me));if(me.role!=='ADMIN')throw new Error('Administrator access is required.');[subjects,questions]=await Promise.all([api('/api/practice/subjects'),api('/api/admin/questions?token='+encodeURIComponent(me.token))]);populateSubjects();renderOptions();applyFilters();icons()}catch(error){document.querySelector('.main').innerHTML='<div class="card empty"><h2>Access unavailable</h2><p style="margin-top:8px">'+error.message+'</p><a class="btn" style="margin-top:16px" href="dashboard.html">Back to dashboard</a></div>'}}
  function populateSubjects(){const options=subjects.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');document.getElementById('subject-filter').insertAdjacentHTML('beforeend',options);document.getElementById('editor-subject').innerHTML='<option value="">Select subject</option>'+options}
  async function topicsFor(subjectId){if(!subjectId)return[];if(!topicCache[subjectId])topicCache[subjectId]=await api('/api/practice/subjects/'+subjectId+'/topics?token='+encodeURIComponent(token()));return topicCache[subjectId]}
  async function subjectFilterChanged(){const id=document.getElementById('subject-filter').value;const topics=await topicsFor(id);document.getElementById('topic-filter').innerHTML='<option value="">All modules</option>'+topics.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');applyFilters()}
  function applyFilters(){const q=document.getElementById('search').value.trim().toLowerCase(),subject=document.getElementById('subject-filter').value,topic=document.getElementById('topic-filter').value,status=document.getElementById('status-filter').value;filtered=questions.filter(item=>(!q||(item.prompt+' '+item.topicName).toLowerCase().includes(q))&&(!subject||String(item.subjectId)===subject)&&(!topic||String(item.topicId)===topic)&&(!status||(status==='active')===item.active));page=1;renderTable()}
  function renderTable(){const start=(page-1)*pageSize,rows=filtered.slice(start,start+pageSize);document.getElementById('question-rows').innerHTML=rows.length?rows.map(item=>`<tr><td class="question-cell"><strong>${escapeHtml(item.prompt)}</strong><span>#${item.id}</span></td><td class="module-cell"><strong>${escapeHtml(item.subjectName)}</strong><span>${escapeHtml(item.topicName)}</span></td><td><span class="pill ${item.difficulty.toLowerCase()}">${item.difficulty.toLowerCase()}</span></td><td><span class="pill ${item.active?'active':'disabled'}">${item.active?'Active':'Disabled'}</span></td><td>${item.attempts} attempts<br><span style="color:var(--muted);font-size:10px">${item.accuracy}% accuracy · ${item.averageTimeSeconds}s avg</span></td><td><div class="actions"><button class="icon-btn" title="Edit" onclick="editQuestion(${item.id})"><i data-lucide="pencil"></i></button><button class="icon-btn" title="${item.active?'Disable':'Enable'}" onclick="toggleQuestion(${item.id},${!item.active})"><i data-lucide="${item.active?'eye-off':'eye'}"></i></button></div></td></tr>`).join(''):'<tr><td colspan="6" class="empty">No questions match these filters.</td></tr>';document.getElementById('page-info').textContent=`${filtered.length} questions · Page ${Math.min(page,Math.max(1,Math.ceil(filtered.length/pageSize)))} of ${Math.max(1,Math.ceil(filtered.length/pageSize))}`;document.getElementById('prev-page').disabled=page===1;document.getElementById('next-page').disabled=start+pageSize>=filtered.length;updateStats();icons()}
  function updateStats(){const attempted=questions.filter(q=>q.attempts>0);document.getElementById('total-stat').textContent=questions.length;document.getElementById('active-stat').textContent=questions.filter(q=>q.active).length;document.getElementById('disabled-stat').textContent=questions.filter(q=>!q.active).length;document.getElementById('accuracy-stat').textContent=(attempted.length?Math.round(attempted.reduce((s,q)=>s+q.accuracy,0)/attempted.length):0)+'%'}
  function changePage(delta){page+=delta;renderTable();scrollTo({top:0,behavior:'smooth'})}
  function renderOptions(values){const list=values||['','','',''];document.getElementById('option-grid').innerHTML=list.map((value,index)=>`<label class="option-input"><input type="radio" name="correct-option" value="${index}" ${index===0?'checked':''}><input class="field-control option-text" value="${escapeAttr(value)}" placeholder="Option ${index+1}" required></label>`).join('')}
  async function loadEditorTopics(selected){const id=document.getElementById('editor-subject').value;const topics=await topicsFor(id);document.getElementById('editor-topic').innerHTML='<option value="">Select module</option>'+topics.map(t=>`<option value="${t.id}" ${String(t.id)===String(selected)?'selected':''}>${t.name}</option>`).join('')}
  function openEditor(){document.getElementById('editor-title').textContent='Add Question';document.getElementById('question-id').value='';document.getElementById('editor-subject').value='';document.getElementById('editor-topic').innerHTML='<option value="">Select module</option>';document.getElementById('editor-difficulty').value='EASY';document.getElementById('editor-prompt').value='';document.getElementById('editor-explanation').value='';renderOptions();showEditor()}
  async function editQuestion(id){const item=questions.find(q=>q.id===id);if(!item)return;document.getElementById('editor-title').textContent='Edit Question';document.getElementById('question-id').value=item.id;document.getElementById('editor-subject').value=item.subjectId;await loadEditorTopics(item.topicId);document.getElementById('editor-difficulty').value=item.difficulty;document.getElementById('editor-prompt').value=item.prompt;document.getElementById('editor-explanation').value=item.explanation;renderOptions(item.options.map(o=>o.text));const correct=item.options.findIndex(o=>o.correct);const radio=document.querySelector(`input[name=correct-option][value="${Math.max(0,correct)}"]`);if(radio)radio.checked=true;showEditor()}
  function showEditor(){document.getElementById('editor-message').classList.remove('show');document.getElementById('editor-overlay').classList.add('show');icons()}
  function closeEditor(){document.getElementById('editor-overlay').classList.remove('show')}
  async function saveQuestion(event){event.preventDefault();const id=document.getElementById('question-id').value;const payload={topicId:Number(document.getElementById('editor-topic').value),difficulty:document.getElementById('editor-difficulty').value,prompt:document.getElementById('editor-prompt').value,explanation:document.getElementById('editor-explanation').value,options:Array.from(document.querySelectorAll('.option-text')).map(i=>i.value),correctIndex:Number(document.querySelector('input[name=correct-option]:checked').value)};const button=document.getElementById('save-btn');button.disabled=true;try{const saved=await api('/api/admin/questions'+(id?'/'+id:'')+'?token='+encodeURIComponent(token()),{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});const index=questions.findIndex(q=>q.id===saved.id);if(index>=0)questions[index]=saved;else questions.push(saved);closeEditor();applyFilters();toast(id?'Question updated.':'Question created.')}catch(error){const message=document.getElementById('editor-message');message.textContent=error.message;message.classList.add('show')}finally{button.disabled=false}}
  async function toggleQuestion(id,active){if(!confirm(`${active?'Enable':'Disable'} this question?`))return;try{await api(`/api/admin/questions/${id}/status?token=${encodeURIComponent(token())}&active=${active}`,{method:'POST'});const item=questions.find(q=>q.id===id);if(item)item.active=active;applyFilters();toast(active?'Question enabled.':'Question disabled.')}catch(error){toast(error.message)}}
  function toast(text){const el=document.getElementById('toast');el.textContent=text;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}
  function escapeHtml(value){return String(value||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))} function escapeAttr(value){return escapeHtml(value)}
  function logoutAdmin(){sessionStorage.removeItem('sp_current_user');location.href='login.html'}
  init();icons();
</script>
</body>
</html>
