<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillPulse - Reset Password</title><link rel="icon" href="./SkillPulse logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/style.css?v=warm-ui-1">
  <style>.recovery-card{max-width:460px}.recovery-copy{text-align:center;color:var(--taupe);font-size:.86rem;line-height:1.5;margin:-.8rem 0 1.5rem}.secondary-link{display:block;text-align:center;margin-top:1rem;color:var(--taupe);font-size:.84rem;font-weight:600;text-decoration:none}.form-global-error.success{color:var(--success);background:rgba(90,144,32,.1)}.input-wrap input{padding-right:3rem}.eye{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);width:2rem;height:2rem;border:0;background:transparent;color:var(--taupe);cursor:pointer;display:grid;place-items:center}.eye svg{width:18px;fill:none;stroke:currentColor;stroke-width:1.8}</style>
</head>
<body>
  <div class="bg-blob blob-1"></div><div class="bg-blob blob-2"></div><div class="bg-blob blob-3"></div><div class="bg-blob blob-4"></div><div class="noise-overlay"></div>
  <div class="auth-page"><div class="auth-card recovery-card">
    <div class="auth-logo-wrap"><img src="./assets/SkillPulse logo.png" alt="SkillPulse" class="auth-logo"><div class="auth-logo-ring r1"></div><div class="auth-logo-ring r2"></div></div>
    <div class="auth-brand"><span class="brand-skill">Skill</span><span class="brand-pulse">Pulse</span></div><p class="auth-tagline">Choose a new password.</p><p class="recovery-copy">Use at least 8 characters and choose something you have not used before.</p>
    <form id="reset-form" class="auth-form active" novalidate>
      <div class="form-group"><label for="new-password">New Password</label><div class="input-wrap"><input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password"><button type="button" class="eye" data-target="new-password" aria-label="Show new password"></button></div><span class="field-error" id="new-error"></span></div>
      <div class="form-group"><label for="confirm-password">Confirm New Password</label><div class="input-wrap"><input type="password" id="confirm-password" placeholder="Repeat new password" autocomplete="new-password"><button type="button" class="eye" data-target="confirm-password" aria-label="Show confirm password"></button></div><span class="field-error" id="confirm-error"></span></div>
      <div class="form-global-error" id="message"></div><button class="auth-btn" id="submit-btn" type="submit"><span class="btn-text">Reset Password</span></button>
    </form><a class="secondary-link" href="/login.html">Back to sign in</a>
  </div></div>
  <script>
    const eye=`<svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;document.querySelectorAll('.eye').forEach(button=>{button.innerHTML=eye;button.addEventListener('click',()=>{const input=document.getElementById(button.dataset.target);input.type=input.type==='password'?'text':'password';button.setAttribute('aria-label',(input.type==='password'?'Show ':'Hide ')+input.id.replace(/-/g,' '))})});
    const token=new URLSearchParams(location.search).get('token')||'',form=document.getElementById('reset-form'),message=document.getElementById('message'),button=document.getElementById('submit-btn');function show(text,success){message.textContent=text||'';message.classList.toggle('show',Boolean(text));message.classList.toggle('success',Boolean(success))}if(!token){show('This reset link is incomplete. Request a new password reset email.',false);button.disabled=true}
    form.addEventListener('submit',async event=>{event.preventDefault();document.getElementById('new-error').textContent='';document.getElementById('confirm-error').textContent='';show('',false);const newPassword=document.getElementById('new-password').value,confirm=document.getElementById('confirm-password').value;let valid=true;if(newPassword.length<8){document.getElementById('new-error').textContent='Password must contain at least 8 characters.';valid=false}if(newPassword!==confirm){document.getElementById('confirm-error').textContent='Passwords do not match.';valid=false}if(!valid)return;button.disabled=true;try{const response=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,newPassword})});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.message||'Unable to reset password.');form.reset();show(data.message,true);setTimeout(()=>location.href='/login.html',1800)}catch(error){show(error.message||'Unable to reset password.',false);button.disabled=false}});
  </script>
</body>
</html>
