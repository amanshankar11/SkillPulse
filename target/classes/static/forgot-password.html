<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillPulse - Recover Password</title>
  <link rel="icon" href="./SkillPulse logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css?v=warm-ui-1">
  <style>.recovery-card{max-width:460px}.recovery-copy{text-align:center;color:var(--taupe);font-size:.86rem;line-height:1.5;margin:-.8rem 0 1.5rem}.secondary-link{display:block;text-align:center;margin-top:1rem;color:var(--taupe);font-size:.84rem;font-weight:600;text-decoration:none}.form-global-error.success{color:var(--success);background:rgba(90,144,32,.1)}</style>
</head>
<body>
  <div class="bg-blob blob-1"></div><div class="bg-blob blob-2"></div><div class="bg-blob blob-3"></div><div class="bg-blob blob-4"></div><div class="noise-overlay"></div>
  <div class="auth-page"><div class="auth-card recovery-card">
    <div class="auth-logo-wrap"><img src="./assets/SkillPulse logo.png" alt="SkillPulse" class="auth-logo"><div class="auth-logo-ring r1"></div><div class="auth-logo-ring r2"></div></div>
    <div class="auth-brand"><span class="brand-skill">Skill</span><span class="brand-pulse">Pulse</span></div>
    <p class="auth-tagline">Recover your account.</p>
    <p class="recovery-copy">Enter your registered email address and we will send you a secure reset link.</p>
    <form id="forgot-form" class="auth-form active" novalidate>
      <div class="form-group"><label for="email">Email Address</label><div class="input-wrap"><svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><input type="email" id="email" placeholder="you@example.com" autocomplete="email"></div><span class="field-error" id="email-error"></span></div>
      <div class="form-global-error" id="message"></div>
      <button class="auth-btn" id="submit-btn" type="submit"><span class="btn-text">Send Reset Link</span></button>
    </form>
    <a class="secondary-link" href="/login.html">Back to sign in</a>
  </div></div>
  <script>
    const email=document.getElementById('email'),form=document.getElementById('forgot-form'),message=document.getElementById('message'),button=document.getElementById('submit-btn');
    function show(text,success){message.textContent=text||'';message.classList.toggle('show',Boolean(text));message.classList.toggle('success',Boolean(success))}
    form.addEventListener('submit',async event=>{event.preventDefault();document.getElementById('email-error').textContent='';show('',false);const value=email.value.trim();if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)){document.getElementById('email-error').textContent='Enter a valid email address.';return}button.disabled=true;try{const response=await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:value})});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.message||'Unable to send reset link.');form.reset();show(data.message,true)}catch(error){show(error.message||'Unable to send reset link.',false)}finally{button.disabled=false}});
  </script>
</body>
</html>
